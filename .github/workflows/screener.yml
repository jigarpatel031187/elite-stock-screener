name: Elite screener update

on:
  schedule:
    # 13:45 UTC = 19:15 IST Mon-Fri - daily re-rank on cached fundamentals
    # (offset 15 min from the Smart Money Ledger cron so the two repos
    #  never hammer Yahoo at the same moment)
    - cron: "45 13 * * 1-5"
    # 04:00 UTC Saturday = 09:30 IST - full fundamentals refresh + re-score
    - cron: "0 4 * * 6"
  workflow_dispatch:
    inputs:
      weekly:
        description: "Force full fundamentals refresh (true/false)"
        required: false
        default: "false"

permissions:
  contents: write

concurrency:
  group: screener-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Decide mode
        id: mode
        run: |
          if [ "${{ github.event.schedule }}" = "0 4 * * 6" ] || [ "${{ github.event.inputs.weekly }}" = "true" ]; then
            echo "flag=--weekly" >> "$GITHUB_OUTPUT"
          else
            echo "flag=" >> "$GITHUB_OUTPUT"
          fi

      - name: Run screener
        run: python scripts/build_screener.py ${{ steps.mode.outputs.flag }}

      - name: Commit results
        run: |
          git config user.name "screener-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data docs/data
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "Screener update $(date -u +'%Y-%m-%d %H:%M UTC')"
          for i in 1 2 3; do
            git pull --rebase origin main && git push && exit 0
            echo "push attempt $i failed, retrying..." && sleep 10
          done
          exit 1
