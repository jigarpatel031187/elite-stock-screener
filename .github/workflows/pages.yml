name: Deploy Pages

# Explicit Actions-based deployment. This REPLACES legacy branch-based Pages,
# which auto-triggers its own internal deploy on every push - including the
# frequent small data-only bot commits - causing overlapping deployments that
# race and report false "failure" when a newer one supersedes an older one.
# concurrency below makes new deploys CANCEL stale in-flight ones cleanly
# instead of racing, which is what actually stops the red X's for good.

on:
  push:
    branches: [main]
    paths: ["docs/**"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs
      - id: deployment
        uses: actions/deploy-pages@v4
